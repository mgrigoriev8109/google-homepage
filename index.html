<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Google</title>
    <link rel="stylesheet" href="reset.css" type="text/css" media="all">
    <link rel="stylesheet" href="mystyle.css" type="text/css" media="all">
</head>

<body>

    <header>
        <nav>
            <ul>
                <div class="box1"> <!-- Flexblox wrapper for header navigation-->
                    <div class="header-left"> 
                    <li><a href="">About</a></li>
                    <li><a href="">Store</a></li>
                    </div>
                    <div class="header-right">
                    <li><a href="">Gmail</a></li>
                    <li><a href="">Images</a></li>
                    <li><a href=""><img id="google-app" src="https://www.svgrepo.com/show/42113/keyboard-buttons-or-visualization-button-of-nine-squares.svg"></a></li>
                    <li><a id="signin" href="">Sign in</a></li>
                    </div>
                </div>
            </ul>
        </nav>
    </header>

<div class='wrapper'> <!-- Flexbox spanning entirety of webpage located inbetween header navbar and footer -->
    <div class="box2"> <!-- Child flexbox for google image-->
        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google logo">
    </div>

    <div class="box3"> <!-- Child box for searchbar -->
        <form>
            <img id="image1" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Google_Magnifying_Glass.svg/512px-Google_Magnifying_Glass.svg.png" alt="Magnifying Glass">
            <input id="textbox" type="text">
            <a href="."><img id="image2" src="https://upload.wikimedia.org/wikipedia/commons/2/22/Google_microphone_logo.png" alt="Microphone"></a>
        </form>
    </div>
      
    <div class="box4"> <!-- Child box for two buttons below search bar-->
        <form>
            <input class="btn" type="button" value="Google Search">
            <input class="btn" type="button" value="I'm Feeling Lucky">
        </form>
    </div>
</div> <!-- Closing tag for wrapper flexbox around main portion of webpage-->

    <footer>
            <ul>
                <div class="box5"> <!-- Flexbox containing footer -->
                    <div class="footer-left">
                        <li><a href="">Advertising</a></li>
                        <li><a href="">Business</a></li>
                        <li><a href="">How Search Works</a></li> 
                    </div>
                    <div class="footer-right">
                        <li><a href="">Privacy</a></li>
                        <li><a href="">Terms</a></li>
                        <li><a href="">Settings</a></li>
                    </div>
                </div>
            </ul>
    </footer>

</body>

</html>
